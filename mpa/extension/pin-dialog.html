<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>暗証番号入力</title>
    <link rel="stylesheet" href="popup.css">
    <style>
      body {
        min-width: auto;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .actions button[type="button"] {
        background: #475569;
      }

      .actions button[type="button"]:hover {
        background: #334155;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1 id="dialog-title"></h1>
      <p id="dialog-lead" class="lead"></p>
      <form id="pin-form">
        <label id="pin-label" for="pin"></label>
        <input id="pin" name="pin" type="password" autocomplete="off" required autofocus>

        <div class="actions">
          <button type="submit">OK</button>
          <button id="cancel" type="button">Cancel</button>
        </div>
      </form>
    </main>

    <script src="pin-dialog.js"></script>
  </body>
</html>
