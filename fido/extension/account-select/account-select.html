<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>アカウント選択</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 360px;
      padding: 24px;
      margin: 0;
      background: #fafafa;
      color: #333;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 18px;
      color: #1a1a1a;
    }
    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
    }
    .account-list {
      list-style: none;
      padding: 0;
      margin: 0 0 16px;
    }
    .account-item {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .account-item:hover {
      background: #e8f0fe;
      border-color: #1a73e8;
    }
    .account-name {
      font-weight: 600;
      font-size: 14px;
    }
    #cancel {
      width: 100%;
      padding: 10px 0;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #e8eaed;
      color: #333;
    }
    #cancel:hover {
      background: #d2d5d9;
    }
  </style>
</head>
<body>
  <h2>アカウント選択</h2>
  <p class="subtitle" id="rpId">-</p>
  <ul class="account-list" id="accountList"></ul>
  <button id="cancel">キャンセル</button>
  <script src="account-select.js"></script>
</body>
</html>
