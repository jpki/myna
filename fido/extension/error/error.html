<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>エラー</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 360px;
      padding: 24px;
      margin: 0;
      background: #fafafa;
      color: #333;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: #d93025;
    }
    .message {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 16px;
      word-break: break-word;
    }
    .buttons {
      display: flex;
      justify-content: flex-end;
    }
    button {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #1a73e8;
      color: #fff;
    }
    button:hover {
      background: #1557b0;
    }
  </style>
</head>
<body>
  <h2>エラー</h2>
  <div class="message" id="message">-</div>
  <div class="buttons">
    <button id="ok" autofocus>OK</button>
  </div>
  <script src="error.js"></script>
</body>
</html>
